# Platform alerts: sync failures, drift, stuck deployments
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: argocd-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: argocd.rules
      rules:
        # App is OutOfSync for more than 15 minutes
        - alert: ArgoCDAppOutOfSync
          expr: |
            argocd_app_info{sync_status="OutOfSync"} == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "ArgoCD app {{ $labels.name }} is out of sync"
            description: "Application {{ $labels.name }} has been OutOfSync for more than 15 minutes. Possible drift detected."

        # App health is Degraded
        - alert: ArgoCDAppDegraded
          expr: |
            argocd_app_info{health_status="Degraded"} == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "ArgoCD app {{ $labels.name }} is degraded"
            description: "Application {{ $labels.name }} health is Degraded for more than 5 minutes."

        # App sync failed
        - alert: ArgoCDSyncFailed
          expr: |
            increase(argocd_app_sync_total{phase="Failed"}[10m]) > 0
          labels:
            severity: critical
          annotations:
            summary: "ArgoCD sync failed for {{ $labels.name }}"
            description: "Application {{ $labels.name }} sync has failed."

        # App stuck in Progressing state
        - alert: ArgoCDAppStuck
          expr: |
            argocd_app_info{health_status="Progressing"} == 1
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "ArgoCD app {{ $labels.name }} stuck progressing"
            description: "Application {{ $labels.name }} has been in Progressing state for 30+ minutes."
