apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      serviceAccountName: novadeploy-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z postgresql.novadeploy.svc 5432; do
                sleep 2
              done
              echo "PostgreSQL is ready."
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for Redis..."
              until nc -z redis.novadeploy.svc 6379; do
                sleep 2
              done
              echo "Redis is ready."
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: worker
          image: stefanprodan/podinfo:6.6.2
          command: ["./podinfo", "--port=9898", "--level=info"]
          env:
            - name: PODINFO_UI_MESSAGE
              value: "NovaDeploy Background Worker"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: worker-db-credentials
                  key: host
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: worker-db-credentials
                  key: password
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: worker-redis-credentials
                  key: host
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9898
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
