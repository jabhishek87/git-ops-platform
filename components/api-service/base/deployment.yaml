apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  labels:
    app: api-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      serviceAccountName: novadeploy-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      initContainers:
        # Wait for database to be reachable before starting
        - name: wait-for-db
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z postgresql.novadeploy.svc 5432; do
                sleep 2
              done
              echo "PostgreSQL is ready."
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
        # Wait for Redis
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for Redis..."
              until nc -z redis.novadeploy.svc 6379; do
                sleep 2
              done
              echo "Redis is ready."
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: api
          image: stefanprodan/podinfo:6.6.2
          ports:
            - containerPort: 9898
              name: http
          env:
            - name: PODINFO_UI_MESSAGE
              value: "NovaDeploy API Service"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: api-service-db-credentials
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: api-service-db-credentials
                  key: port
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: api-service-db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-service-db-credentials
                  key: password
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: api-service-redis-credentials
                  key: host
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9898
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9898
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
