apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-service-db
  namespace: novadeploy
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: api-service-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: dev/api-service/db
        property: username
    - secretKey: password
      remoteRef:
        key: dev/api-service/db
        property: password
    - secretKey: host
      remoteRef:
        key: dev/api-service/db
        property: host
    - secretKey: port
      remoteRef:
        key: dev/api-service/db
        property: port
    - secretKey: database
      remoteRef:
        key: dev/api-service/db
        property: database
