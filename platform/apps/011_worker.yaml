# Sync-Order 011: Background Worker — needs database + redis + secrets
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: worker
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jabhishek87/git-ops-platform.git
    targetRevision: main
    path: components/worker/base
  destination:
    server: https://kubernetes.default.svc
    namespace: novadeploy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
